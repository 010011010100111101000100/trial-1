<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching Discord...</title>
    <style>
        body {
            background-color: #2f3136;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader-container {
            text-align: center;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
    <script>
        setTimeout(function(){
            window.location.href = "https://discord.com/app";
        }, 2000); // Redirects after 2 seconds
    </script>
</head>
<body>

    <div class="loader-container" role="status" aria-live="polite">
        <h2>Opening your Discord Portal...</h2>
        <p>If you are not redirected within a few seconds, click the button below.</p>
        <a href="https://discord.com/app" class="btn">Go to Discord DMs & Servers</a>
    </div>

</body>
</html>
